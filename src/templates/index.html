<!DOCTYPE html>
<html>
<head>
    <title>Smartphone Addiction Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px auto;
            max-width: 500px;
            background-color: #f4f4f4;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        p.subtitle {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-top: -10px;
        }
        form {
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            font-size: 14px;
            color: #444;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 6px 0 18px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        input[type="submit"] {
            width: 100%;
            background-color: #333;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        input[type="submit"]:hover {
            background-color: #555;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            background-color: #fff;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h2>📱 Smartphone Addiction Predictor</h2>
    <p class="subtitle">Enter your daily usage habits below to get a prediction.</p>

    <form action="/" method="post">
        <label>Daily Screen Time (hours)</label>
        <input type="number" step="any" min="0" max="24" name="daily_screen_time" placeholder="e.g. 7.5" required>

        <label>Weekend Screen Time (hours)</label>
        <input type="number" step="any" min="0" max="24" name="weekend_screen_time" placeholder="e.g. 10.0" required>

        <label>Social Media Hours (per day)</label>
        <input type="number" step="any" min="0" max="24" name="social_media_hours" placeholder="e.g. 3.0" required>

        <label>App Opens (per day)</label>
        <input type="number" step="any" min="0" name="app_opens" placeholder="e.g. 80" required>

        <input type="submit" value="Predict">
    </form>

    {% if prediction != None %}
        <div class="result">
            Result: {{ prediction }}
        </div>
    {% endif %}
</body>
</html>
